  <!-- "n" redondeada en el color del logo -->
  <text x="30" y="50"
    font-family="'Nunito', 'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif"
    font-size="52" font-weight="800"
    text-anchor="middle"
    fill="#7BBFBE">n</text>
  <!-- Punto que imita el punto de la "i" del logo nui -->
